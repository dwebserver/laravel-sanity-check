name: Bug report
description: Report unexpected behavior or a regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this package. Please search [existing issues](https://github.com/dwebserver/laravel-sanity-check/issues) first.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, and what did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps, config snippets, or Artisan flags if relevant.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: e.g. 11.44.0

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3.12

  - type: dropdown
    id: execution
    attributes:
      label: Where does it happen?
      options:
        - Dashboard / HTTP
        - Artisan (`sanity-check:run`)
        - Both
        - Not sure
    validations:
      required: true
