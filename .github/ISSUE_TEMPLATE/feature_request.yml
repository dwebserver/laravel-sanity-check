name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement. Check [the roadmap](https://github.com/dwebserver/laravel-sanity-check#18-roadmap) and open issues first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to achieve? What is missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work (API, config, UX)? Optional sketches or examples welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches you considered.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I am willing to help review or test a PR if this is implemented.
          required: false
