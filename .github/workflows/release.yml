name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          mkdir -p dist/bundle-staging
          git archive --format=zip -o "dist/dwebserver-laravel-sanity-check-${VERSION}-source.zip" HEAD
          composer show --format=json > dist/composer-metadata.snapshot.json
          cp "dist/dwebserver-laravel-sanity-check-${VERSION}-source.zip" dist/bundle-staging/
          cp README.md CHANGELOG.md LICENSE.md composer.json CODE_OF_CONDUCT.md SECURITY.md dist/bundle-staging/
          cp dist/composer-metadata.snapshot.json dist/bundle-staging/
          (cd dist/bundle-staging && zip -r "../dwebserver-laravel-sanity-check-${VERSION}-release-bundle.zip" .)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/dwebserver-laravel-sanity-check-${{ github.ref_name }}-source.zip
            dist/dwebserver-laravel-sanity-check-${{ github.ref_name }}-release-bundle.zip
            dist/composer-metadata.snapshot.json
