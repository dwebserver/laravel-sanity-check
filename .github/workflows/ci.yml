name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  composer-validate:
    name: Composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

  code-style:
    name: Code style (Pint)
    runs-on: ubuntu-latest
    needs:
      - composer-validate
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: composer run lint

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    needs:
      - composer-validate
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: composer run analyse

  tests:
    name: ${{ matrix.description }}
    runs-on: ubuntu-latest
    needs:
      - composer-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', testbench: '^8.0', description: 'Laravel 10 · PHP 8.1' }
          - { php: '8.3', testbench: '^8.0', description: 'Laravel 10 · PHP 8.3' }
          - { php: '8.2', testbench: '^9.0', description: 'Laravel 11 · PHP 8.2' }
          - { php: '8.3', testbench: '^9.0', description: 'Laravel 11 · PHP 8.3' }
          - { php: '8.2', testbench: '^10.0', description: 'Laravel 12 · PHP 8.2' }
          - { php: '8.3', testbench: '^10.0', description: 'Laravel 12 · PHP 8.3' }
          - { php: '8.4', testbench: '^10.0', description: 'Laravel 12 · PHP 8.4' }

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Pin Orchestra Testbench (Laravel compatibility)
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Run PHPUnit
        run: |
          mkdir -p build/logs
          composer run test:ci

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ strategy.job-index }}-${{ matrix.php }}
          path: build/logs/junit.xml
          if-no-files-found: ignore

  coverage:
    name: Coverage (PCOV)
    runs-on: ubuntu-latest
    needs:
      - composer-validate
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, sqlite, pdo_sqlite
          coverage: pcov
          tools: composer:v2
          ini-values: pcov.directory=src

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit with Clover
        run: |
          mkdir -p build/logs
          composer run test:coverage-ci

      - name: Upload Clover coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: build/logs/clover.xml
          if-no-files-found: ignore
